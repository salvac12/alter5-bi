name: Process Gmail Emails

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 05:00 Madrid (after GAS runs at ~03:12)
  workflow_dispatch:
    inputs:
      reprocess:
        description: 'Re-process emails already marked as done (backfill)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process pending emails
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ "${{ github.event.inputs.reprocess }}" = "true" ]; then
            echo "Running in REPROCESS mode..."
            python scripts/process_sheet_emails.py --reprocess
          else
            python scripts/process_sheet_emails.py
          fi

      - name: Sync Airtable opportunities
        if: ${{ env.AIRTABLE_PAT != '' }}
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
        run: python scripts/sync_airtable_opportunities.py

      - name: Commit and push if changed
        run: |
          git config user.name "alter5-bi-bot"
          git config user.email "bot@alter5.com"
          for f in src/data/companies.json src/data/companies_full.json src/data/employees.json src/data/opportunities.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: actualización automática desde Gmail pipeline

            $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
