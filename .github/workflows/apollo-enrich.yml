name: Apollo Contact Enrichment

on:
  schedule:
    # - cron: '15 * * * *'  # every hour at :15 — disabled: Apollo key in use elsewhere
  workflow_dispatch:
    inputs:
      top:
        description: 'Number of companies to process'
        required: false
        default: '100'
        type: string
      stop_schedule:
        description: 'Disable the hourly schedule after this run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_WORKFLOW }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check remaining companies
        id: check
        run: |
          COUNT=$(python -c "
          import json
          with open('src/data/companies_full.json') as f:
              data = json.load(f)
          companies = data.get('companies', data)
          remaining = 0
          for d, c in companies.items():
              if not isinstance(c, dict):
                  continue
              enrichment = c.get('enrichment', {})
              role = enrichment.get('role', '')
              if role not in ('Originacion', 'Originación'):
                  continue
              contacts = c.get('contacts', [])
              for ct in contacts:
                  if not isinstance(ct, dict):
                      continue
                  r = ct.get('role', 'No identificado')
                  src = ct.get('_role_source', '')
                  if r == 'No identificado' and src != 'apollo':
                      remaining += 1
                      break
          print(remaining)
          ")
          echo "remaining=$COUNT" >> $GITHUB_OUTPUT
          echo "Remaining companies to enrich: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "All companies enriched! Nothing to do."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Apollo enrichment
        if: steps.check.outputs.skip == 'false'
        env:
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        run: |
          TOP="${{ github.event.inputs.top || '100' }}"
          echo "Enriching top $TOP companies..."
          python scripts/enrich_contacts.py --backend apollo --top "$TOP" 2>&1 | tee /tmp/apollo.log
          # Extract stats from last lines
          tail -5 /tmp/apollo.log

      - name: Commit and push if changed
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "alter5-bi-bot"
          git config user.email "bot@alter5.com"
          git add src/data/companies.json src/data/companies_full.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Count enriched from the files
            APOLLO_COUNT=$(grep -c '"_role_source": "apollo"' src/data/companies_full.json || echo 0)
            REMAINING="${{ steps.check.outputs.remaining }}"
            git commit -m "data: Apollo batch — contactos enriquecidos (total apollo: $APOLLO_COUNT, pendientes: $REMAINING)

            $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
